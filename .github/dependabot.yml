version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    ignore:
      - dependency-name: "python"
    commit-message:
      prefix: "deps"
    groups:
      deps:
        patterns:
          - "*"
