[project]
name = "fastfetchbot-shared"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
    "loguru>=0.7.2",
    "beautifulsoup4>=4.13.4",
    "httpx>=0.28.1",
    "lxml>=5.4.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "pillow>=10.0.0",
    "python-magic>=0.4.27",
    "aiofiles>=24.1.0",
    "fake-useragent>=1.5.1",
    "playwright>=1.52.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "aiosqlite>=0.17.0",
]

[project.optional-dependencies]
postgres = ["asyncpg>=0.30.0"]
migrate = ["alembic>=1.15.0"]
scrapers = [
    "jinja2>=3.1.6",
    "jmespath>=1.0.1",
    "twitter-api-client-v2>=0.1.1",
    "atproto>=0.0.61",
    "asyncpraw>=7.8.1",
    "openai>=2.15.0",
    "html-telegraph-poster-v2>=0.2.5",
    "firecrawl-py>=4.13.0",
    "zyte-api>=0.8.1",
    "tenacity>=9.1.2",
    "markdown>=3.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
